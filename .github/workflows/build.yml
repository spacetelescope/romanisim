name: build

on:
  release:
    types: [released]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    uses: OpenAstronomy/github-actions-workflows/.github/workflows/publish.yml@e5af21e4ae37af089a73bb032e10b78b0e746174 # v3.0.1
    with:
      env: |
        FFTW_DIR: /opt/homebrew/opt/fftw/lib/
      targets: |
        # Linux wheels
        - cp3*[!t]-manylinux_x86_64
        # MacOS wheels
        - cp3*[!t]-macosx_x86_64
        # MacOS arm64 wheels
        - cp3*[!t]-macosx_arm64
      sdist: true
      test_command: python -c "from romanisim import ramp_fit_casertano"
      upload_to_pypi: ${{ (github.event_name == 'release') && (github.event.action == 'released') }}
    secrets:
      pypi_token: ${{ secrets.PYPI_PASSWORD_STSCI_MAINTAINER }}
